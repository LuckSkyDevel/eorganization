spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/eorganization_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      mode: always
      continue-on-error: true

jwt:
  secret: openssl rand -base64 32
  accessTokenValiditySeconds: 600     # 10 minutes
  refreshTokenValiditySeconds: 1209600 # 14 days

server:
  port: 8081
